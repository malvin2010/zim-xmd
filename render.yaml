services:
  - type: web
    name: zim-xmd-ultimate
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --legacy-peer-deps --no-audit --no-fund
    startCommand: node index.js
    envVars:
      - key: OWNER_NUMBER
        sync: false
      - key: SESSION_ID
        sync: false
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
